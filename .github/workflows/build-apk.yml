name: Build Android APK

on:
  push:
    branches: [ kotlin-android ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. Dynamic Build Setup (Handles nested structures gracefully)
    - name: Build with Gradle
      run: |
        # Find where gradlew is actually located in the repository dynamically
        GRADLEW_PATH=$(find . -name gradlew | head -n 1)
        
        if [ -z "$GRADLEW_PATH" ]; then
          echo "⚠️ gradlew not found! Generating fallback wrapper configuration..."
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug
        else
          echo "🎯 Found gradlew at: $GRADLEW_PATH"
          DIR_PATH=$(dirname "$GRADLEW_PATH")
          cd "$DIR_PATH"
          chmod +x gradlew
          ./gradlew assembleDebug
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Foxysc-APK
        path: app/build/outputs/apk/debug/app-debug.apk
