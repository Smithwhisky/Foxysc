name: Build Android APK

on:
  push:
    branches: [ kotlin-android ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. Dynamic Build Setup (Handles nested structures gracefully)
    # 3. Regenerate a clean Gradle environment
    - name: Force Clean Gradle Setup & Build
      run: |
        echo "🗑️ Removing corrupted local gradle wrappers to prevent syntax issues..."
        rm -f gradlew
        rm -f gradlew.bat
        rm -rf gradle/wrapper/
        
        echo "⚙️ Generating fresh, pristine Gradle Wrapper (v8.5)..."
        gradle wrapper --gradle-version 8.5
        
        echo "🔐 Setting executable permissions..."
        chmod +x gradlew
        
        echo "🚀 Launching pristine compilation engine..."
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Foxysc-APK
        path: app/build/outputs/apk/debug/app-debug.apk
