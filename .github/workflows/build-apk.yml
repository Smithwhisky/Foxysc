name: Build Android APK

on:
  push:
    branches: [ kotlin-android ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

 # 3. Force lock the runner environment to Gradle 8.5
    - name: Setup Gradle 8.5 Environment
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.5

    # 4. Clean local wrappers and build with the localized 8.5 runtime
    - name: Clean & Build with Gradle 8.5
      run: |
        echo "🗑️ Removing local wrappers..."
        rm -f gradlew
        rm -f gradlew.bat
        rm -rf gradle/wrapper/
        
        echo "⚙️ Regenerating precise 8.5 wrapper..."
        gradle wrapper --gradle-version 8.5
        
        echo "🔐 Setting execution permissions..."
        chmod +x gradlew
        
        echo "🚀 Running compilation under permissive 8.5 engine..."
        ./gradlew assembleDebug --no-daemon


    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Foxysc-APK
        path: app/build/outputs/apk/debug/app-debug.apk
